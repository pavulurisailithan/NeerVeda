<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - GreenThumbGuardians</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/feather-icons"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');
        body {
            font-family: 'Poppins', sans-serif;
            background: url('http://static.photos/farm/1200x630/2') no-repeat center center fixed;
            background-size: cover;
        }
        .register-box {
            backdrop-filter: blur(10px);
            background-color: rgba(255, 255, 255, 0.8);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center">
    <div class="register-box p-8 rounded-xl shadow-2xl w-full max-w-md">
        <div class="text-center mb-8">
            <div class="flex justify-center mb-4">
                <i data-feather="droplet" class="text-green-600 w-12 h-12"></i>
            </div>
            <h1 class="text-3xl font-bold text-gray-800" data-translate="Create Account">Create Account</h1>
            <p class="text-gray-600">Get started with NeerVeda</p>
            
            <div class="mt-4 relative">
                <button id="langBtn" class="flex items-center space-x-1 bg-green-600 text-white px-3 py-1 rounded">
                    <span id="langText">EN</span>
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                </button>
                <div id="langDropdown" class="hidden absolute right-0 mt-2 bg-white rounded-lg shadow-lg border z-10">
                    <button onclick="switchLanguage('en')" class="block px-4 py-2 text-gray-800 hover:bg-gray-100 w-full text-left">English</button>
                    <button onclick="switchLanguage('te')" class="block px-4 py-2 text-gray-800 hover:bg-gray-100 w-full text-left">తెలుగు</button>
                </div>
            </div>
</div>
        
        <form id="registerForm" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1" data-translate="Full Name">Full Name</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <i data-feather="user" class="text-gray-400"></i>
                    </div>
                    <input type="text" required class="pl-10 w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-green-500">
                </div>
            </div>
            
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1" data-translate="Email">Email</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <i data-feather="mail" class="text-gray-400"></i>
                    </div>
                    <input type="email" required class="pl-10 w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-green-500">
                </div>
            </div>
            
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1" data-translate="Password">Password</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <i data-feather="lock" class="text-gray-400"></i>
                    </div>
                    <input type="password" required minlength="8" class="pl-10 w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-green-500">
                </div>
                <p class="text-xs text-gray-500 mt-1">Must be at least 8 characters</p>
            </div>
            
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Confirm Password</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <i data-feather="lock" class="text-gray-400"></i>
                    </div>
                    <input type="password" required minlength="8" class="pl-10 w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-green-500">
                </div>
            </div>
            
            <div class="flex items-center">
                <input id="terms" type="checkbox" required class="h-4 w-4 text-green-600 focus:ring-green-500 border-gray-300 rounded">
                <label for="terms" class="ml-2 block text-sm text-gray-700">
                    I agree to the <a href="#" class="text-green-600 hover:text-green-800">Terms of Service</a> and <a href="#" class="text-green-600 hover:text-green-800">Privacy Policy</a>
                </label>
            </div>
            
            <button type="submit" class="w-full bg-green-600 text-white py-2 px-4 rounded-lg hover:bg-green-700 transition duration-200 flex items-center justify-center">
                <span data-translate="Create Account">Create Account</span>
                <i data-feather="user-plus" class="ml-2"></i>
            </button>
            
            <div class="text-center text-sm text-gray-600">
                <span data-translate="Already have an account?">Already have an account?</span> <a href="login.html" class="text-green-600 hover:text-green-800" data-translate="Sign In">Sign in</a>
            </div>
        </form>
    </div>

    <script src="/static/js/translations.js"></script>
    <script>
        feather.replace();
        document.getElementById('registerForm').addEventListener('submit', function(e) {
            e.preventDefault();
            // In a real app, you would register with your backend
            window.location.href = 'dashboard.html';
        });
    </script>
</body>
</html>
